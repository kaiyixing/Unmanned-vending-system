server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/vending_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: vending
    password: vending1234
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.vending.module.*.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: vending-system-secret-key-2026-must-be-at-least-256-bits
  expiration: 7200000
  header: Authorization
  prefix: "Bearer "

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin1234
  bucket-name: vending-images

logging:
  level:
    com.vending: debug
    org.springframework.security: debug
